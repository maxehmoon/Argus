name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: Existing version tag to release, for example v1.0.0
        required: true
        type: string

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-and-release:
    runs-on: macos-15
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

    steps:
      - name: Check out release tag
        uses: actions/checkout@v6
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Validate release version
        run: |
          app_version=$(/usr/libexec/PlistBuddy \
            -c 'Print :CFBundleShortVersionString' \
            Resources/Info.plist)
          if [[ "${RELEASE_TAG}" != "v${app_version}" ]]; then
            echo "Tag ${RELEASE_TAG} does not match app version ${app_version}." >&2
            exit 1
          fi

      - name: Run tests
        run: >-
          xcodebuild
          -project Metrics.xcodeproj
          -scheme Metrics
          -destination 'platform=macOS'
          -derivedDataPath "$RUNNER_TEMP/ArgusTests"
          CODE_SIGNING_ALLOWED=NO
          test

      - name: Build release app
        run: ./Scripts/build-app.sh

      - name: Create DMG
        run: ./Scripts/create-dmg.sh

      - name: Create checksum
        run: shasum -a 256 dist/Argus.dmg > dist/Argus.dmg.sha256

      - name: Generate signed update feed
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          if [[ -z "${SPARKLE_PRIVATE_KEY}" ]]; then
            echo "SPARKLE_PRIVATE_KEY is not configured." >&2
            exit 1
          fi

          appcast_tool=".build/SourcePackages/artifacts/sparkle/Sparkle/bin/generate_appcast"
          mkdir -p dist/update-feed
          printf '%s' "${SPARKLE_PRIVATE_KEY}" | "${appcast_tool}" \
            --ed-key-file - \
            --download-url-prefix "https://github.com/maxehmoon/Argus/releases/download/${RELEASE_TAG}/" \
            --link "https://github.com/maxehmoon/Argus" \
            --maximum-versions 1 \
            --maximum-deltas 0 \
            -o dist/update-feed/appcast.xml \
            dist

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          gh release create "${RELEASE_TAG}"
          dist/Argus.dmg
          dist/Argus.dmg.sha256
          --verify-tag
          --title "Argus ${RELEASE_TAG#v}"
          --generate-notes

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload update feed
        uses: actions/upload-pages-artifact@v4
        with:
          path: dist/update-feed

  deploy-update-feed:
    needs: build-and-release
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Publish update feed
        id: deployment
        uses: actions/deploy-pages@v4
